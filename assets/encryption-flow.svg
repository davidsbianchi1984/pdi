<svg role="img" aria-labelledby="t d" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 560" width="1300" height="560" font-family="Helvetica, Arial, sans-serif">
  <title id="t">PDI encryption flow — seal, store, audit</title>
  <desc id="d">PDI encryption flow — seal, store, audit. Hand-built vector illustration from the QRME product family design system.</desc>
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0A0C28"/>
      <stop offset="0.5" stop-color="#141639"/>
      <stop offset="1" stop-color="#0A0C28"/>
    </linearGradient>
    <radialGradient id="fvign" cx="0.5" cy="0.5" r="0.8">
      <stop offset="0.64" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#06071C" stop-opacity="0.55"/>
    </radialGradient>
    <linearGradient id="fcard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A2C63"/>
      <stop offset="1" stop-color="#1C1E4B"/>
    </linearGradient>
    <filter id="fshadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#04051A" flood-opacity="0.6"/>
    </filter>
    <filter id="fsoft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="9"/></filter>
    <marker id="farrow" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto">
      <path d="M1 1 L8.5 5 L1 9 Z" fill="#9FD8E8"/>
    </marker>
  </defs>

  <rect width="1300" height="560" fill="url(#fbg)"/>

  <text x="650" y="56" text-anchor="middle" font-size="26" font-weight="bold" fill="#F4E3C8" letter-spacing="1.5">What happens to a secret</text>

  <!-- 1: plaintext -->
  <g transform="translate(80 190)" filter="url(#fshadow)">
    <rect width="230" height="150" rx="16" fill="url(#fcard)"/>
    <rect width="230" height="150" rx="16" fill="none" stroke="#C9CDD8" stroke-opacity="0.3" stroke-width="1.2"/>
    <text x="20" y="34" font-size="14" font-weight="bold" fill="#F4E3C8">Plaintext in</text>
    <g transform="translate(20 56)" font-family="Courier New, monospace" font-size="11">
      <rect width="190" height="72" rx="8" fill="#0D0F30"/>
      <text x="12" y="22" fill="#C9CDD8">{"ssn": "…",</text>
      <text x="12" y="40" fill="#C9CDD8"> "notes": "…"}</text>
      <text x="12" y="60" fill="#8B90A8">key: patients/42</text>
    </g>
  </g>

  <!-- 2: cipher core -->
  <g transform="translate(475 265)">
    <g filter="url(#fsoft)"><circle r="92" fill="#5FA8C0" opacity="0.3"/></g>
    <circle r="84" fill="#1B1D4E" stroke="#9FD8E8" stroke-opacity="0.7" stroke-width="2" filter="url(#fshadow)"/>
    <circle r="66" fill="none" stroke="#9FD8E8" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="3 8"/>
    <g>
      <rect x="-17" y="-6" width="34" height="28" rx="6" fill="#E8A34D"/>
      <path d="M-11 -6 v-9 a11 11 0 0 1 22 0 v9" fill="none" stroke="#E8A34D" stroke-width="6"/>
      <circle cy="6" r="4" fill="#12143B"/>
    </g>
    <text y="48" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#F4E3C8">AES-256-GCM</text>
    <!-- inputs -->
    <g font-size="11" fill="#9FD8E8" text-anchor="middle">
      <text y="-96">master key (KMS/HSM)</text>
      <text y="112">AAD = tenant : key</text>
    </g>
    <g stroke="#9FD8E8" stroke-opacity="0.55" stroke-width="1.4" stroke-dasharray="2 6">
      <line y1="-88" y2="-66"/>
      <line y1="104" y2="86"/>
    </g>
  </g>

  <!-- 3: stored blob -->
  <g transform="translate(660 190)" filter="url(#fshadow)">
    <rect width="250" height="150" rx="16" fill="url(#fcard)"/>
    <rect width="250" height="150" rx="16" fill="none" stroke="#9FD8E8" stroke-opacity="0.5" stroke-width="1.4"/>
    <text x="20" y="34" font-size="14" font-weight="bold" fill="#F4E3C8">On disk</text>
    <g transform="translate(20 56)" font-family="Courier New, monospace" font-size="11">
      <rect width="210" height="72" rx="8" fill="#0D0F30"/>
      <text x="12" y="22" fill="#5FA8C0">kQ7…9zX2mB4…</text>
      <text x="12" y="40" fill="#5FA8C0">Yt1…C8vN0pL…</text>
      <text x="12" y="60" fill="#8B90A8">nonce ‖ ct ‖ tag</text>
    </g>
  </g>

  <!-- 4: audit entry -->
  <g transform="translate(990 190)" filter="url(#fshadow)">
    <rect width="230" height="150" rx="16" fill="url(#fcard)"/>
    <rect width="230" height="150" rx="16" fill="none" stroke="#9FD8E8" stroke-opacity="0.5" stroke-width="1.4"/>
    <text x="20" y="34" font-size="14" font-weight="bold" fill="#F4E3C8">Audit entry</text>
    <g transform="translate(20 56)" font-family="Courier New, monospace" font-size="11">
      <rect width="190" height="72" rx="8" fill="#0D0F30"/>
      <text x="12" y="22" fill="#C9CDD8">op: put</text>
      <text x="12" y="40" fill="#C9CDD8">prev: 3f9a…</text>
      <text x="12" y="60" fill="#9FD8E8">hash: b21c…</text>
    </g>
  </g>

  <!-- flow arrows -->
  <g fill="none" stroke="#9FD8E8" stroke-width="2.4" stroke-opacity="0.75" stroke-linecap="round">
    <path d="M318 265 H375" marker-end="url(#farrow)"/>
    <path d="M568 265 H648" marker-end="url(#farrow)"/>
    <path d="M918 265 H978" marker-end="url(#farrow)"/>
  </g>

  <!-- footnotes -->
  <g transform="translate(650 480)" text-anchor="middle">
    <rect x="-420" y="-26" width="840" height="46" rx="23" fill="#0D0F30" filter="url(#fshadow)"/>
    <rect x="-420" y="-26" width="840" height="46" rx="23" fill="none" stroke="#2E3170" stroke-width="1.4"/>
    <text y="3" font-size="13" fill="#C9CDD8">reads reverse the path — wrong tenant, wrong key, or a flipped byte fails authentication, and every access lands in the chain</text>
  </g>

  <rect width="1300" height="560" fill="url(#fvign)"/>
</svg>
